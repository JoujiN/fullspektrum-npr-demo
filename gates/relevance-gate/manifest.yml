name: relevance-gate
description: >
  Validates that the researcher's output is substantively on-topic for the
  original task. Compares keywords from the task-plan against the research
  content using word overlap scoring. Rejects research that scores below
  0.4 (40% keyword overlap) and provides a redirect signal embedded in the
  reason string.
version: "0.1.0"
exec: ./gate.py
timeout: 10s
policy:
  threshold: 0.4
# Multi-key inputs declaration. The active A-Team agents write shared
# outputs under a-team/coordinator/<output_key>, so the host composes
# {"task_plan": <value>, "research": <value>} from those coord-store keys.
inputs:
  - name: task_plan
    member: coordinator
    output_key: task-plan
  - name: research
    member: coordinator
    output_key: research
