services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "${QDRANT_BIND_HOST:-127.0.0.1}:${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_BIND_HOST:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:6333/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  qdrant-data:
    name: fullspektrum-qdrant-data
